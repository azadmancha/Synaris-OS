name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: synaris_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
      
      - name: Lint with Ruff
        run: |
          ruff check backend/
      
      - name: Run tests
        run: |
          cd backend && pytest
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/synaris_test
          REDIS_URL: redis://localhost:6379/0

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd frontend && npm ci
      
      - name: Type check
        run: |
          cd frontend && npm run typecheck
      
      - name: Lint
        run: |
          cd frontend && npm run lint
      
      - name: Run tests
        run: |
          cd frontend && npm test

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install safety
        run: pip install safety
      
      - name: Check dependencies
        run: safety check -r backend/requirements.txt --continue-on-error
